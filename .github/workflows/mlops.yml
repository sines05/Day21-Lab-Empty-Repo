name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
      - 'tests/**.py'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Authenticate to Cloud Storage
        run: |
          cat << 'EOF' > /tmp/sa-key.json
          ${{ secrets.CLOUD_CREDENTIALS }}
          EOF
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV
          
      - name: Setup DVC Remote
        run: |
          dvc remote modify myremote credentialpath /tmp/sa-key.json
          
      - name: Pull data with DVC
        run: dvc pull

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACCURACY=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACCURACY" >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          bucket_name = "${{ secrets.CLOUD_BUCKET }}"
          client = storage.Client()
          bucket = client.bucket(bucket_name)
          
          # Upload model
          blob = bucket.blob("models/latest/model.pkl")
          blob.upload_from_filename("models/model.pkl")
          
          # Upload metrics.json to keep track of previous accuracy (Bonus 4)
          blob_metrics = bucket.blob("models/latest/metrics.json")
          blob_metrics.upload_from_filename("outputs/metrics.json")
          EOF

      - name: Save metrics and report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-and-report
          path: outputs/

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Cloud Storage
        run: |
          cat << 'EOF' > /tmp/sa-key.json
          ${{ secrets.CLOUD_CREDENTIALS }}
          EOF
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV
          
      - name: Install google-cloud-storage
        run: pip install google-cloud-storage
          
      - name: Check eval gate & Rollback (Bonus 4)
        run: |
          python - <<'EOF'
          import os
          import sys
          import json
          from google.cloud import storage
          
          new_accuracy = float("${{ needs.train.outputs.accuracy }}")
          print(f"New Model Accuracy: {new_accuracy}")
          
          if new_accuracy < 0.50:
              print(f"FAILED: New accuracy {new_accuracy} is below threshold 0.50")
              sys.exit(1)
              
          bucket_name = "${{ secrets.CLOUD_BUCKET }}"
          client = storage.Client()
          bucket = client.bucket(bucket_name)
          blob = bucket.blob("models/previous/metrics.json")
          
          if blob.exists():
              blob.download_to_filename("old_metrics.json")
              with open("old_metrics.json") as f:
                  old_metrics = json.load(f)
              old_accuracy = old_metrics.get("accuracy", 0)
              print(f"Old Model Accuracy: {old_accuracy}")
              
              if new_accuracy < old_accuracy:
                  print(f"FAILED: New accuracy ({new_accuracy}) is worse than previous accuracy ({old_accuracy}). Rollback!")
                  sys.exit(1)
              else:
                  print("SUCCESS: New model is better or equal. Proceeding to deploy.")
          else:
              print("No previous model found. Deploying new model.")
              
          # Copy current latest metrics to previous for the next run
          blob_latest = bucket.blob("models/latest/metrics.json")
          if blob_latest.exists():
              bucket.copy_blob(blob_latest, bucket, "models/previous/metrics.json")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 15
            curl -f http://localhost:8000/health || exit 1
